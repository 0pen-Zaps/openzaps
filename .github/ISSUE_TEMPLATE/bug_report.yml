name: Bug report
description: Something in the app, the API, or the contracts behaves wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not use this for a security vulnerability** — see SECURITY.md for private disclosure.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page or route
      description: e.g. /app, /zaps, or an API endpoint
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - API
        - Contracts
        - Docs / content
        - Not sure
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser, wallet, network — anything relevant. Never paste a private key or seed phrase.
