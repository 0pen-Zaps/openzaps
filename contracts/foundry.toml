[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc = "0.8.34"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
evm_version = "cancun"
remappings = ["forge-std/=lib/forge-std/src/"]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
fail_on_revert = false
